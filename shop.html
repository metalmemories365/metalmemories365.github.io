<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Your Deluxe Collage | Metal Memories 365</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .catalog-item img { width: 100%; border-radius: 8px; border: 2px solid #444; }
        h2 { color: #ffcc00; text-transform: uppercase; border-bottom: 2px solid #ffcc00; display: inline-block; }

        .metal-panel {
            background: linear-gradient(145deg, #999, #555);
            border: 4px solid #333;
            border-radius: 15px;
            padding: 30px;
            color: #000;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 40px;
        }

        .panel-title { font-family: 'Impact', sans-serif; font-size: 1.8rem; border-bottom: 1px solid #444; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, textarea, select {
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px;
            border: 1px solid #888; box-sizing: border-box; font-size: 1rem;
        }

        .price-display { font-size: 1.5rem; font-weight: bold; margin: 20px 0; color: #b00; }

        .buy-btn {
            background: #333; color: #fff; border: none; padding: 20px;
            font-size: 1.5rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase;
        }
        .buy-btn:hover { background: #000; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="reference-section">
        <h2>1. Choose Your Style</h2>
        <div class="catalog-grid">
            <div class="catalog-item">
                <p>8x12 Options</p>
                <img src="8X12-CATALOG-git.io.jpg" alt="8x12 Catalog">
            </div>
            <div class="catalog-item">
                <p>11x14 Options</p>
                <img src="11X14-CATALOG-jpg.git.io.jpg" alt="11x14 Catalog">
            </div>
        </div>
    </div>

    <div class="metal-panel">
        <div class="panel-title">YOUR DELUXE PRINT DETAILS</div>

        <label>Select Size</label>
        <select id="size-select" onchange="updatePrice()">
            <option value="" disabled selected>-- Select a Size --</option>
            <option value="price_1TB1D3GRwb0pbw5MKe8KiTMr">8x12 Metal Print - $58.88</option>
            <option value="price_INSERT_YOUR_11x14_ID_HERE">11x14 Metal Print - $98.88</option>
        </select>

        <label>Full Name</label>
        <input type="text" id="cust-name" placeholder="Name for the order">

        <label>Background Style #</label>
        <input type="text" id="cust-bg" placeholder="e.g., Background #4">

        <label>Any Specific Notes?</label>
        <textarea id="cust-notes" rows="3"></textarea>

        <div class="price-display">Total: <span id="display-amount">$0.00</span></div>

        <button class="buy-btn" id="checkout-button">COMPLETE PURCHASE</button>

        <p style="font-size: 0.8rem; text-align: center; margin-top: 10px;">
            * After payment, email photos to metalmemories365@gmail.com
        </p>
    </div>
</div>

<script>
    // Initialize Stripe with your Public Key
    const stripe = Stripe('pk_live_51TAyheGRwb0pbw5MnKWqys0u8Uxmve11CJjazlbGsGON1v5NXLoB7S097I0Y6I705hGf9X9kO3m1p3N8S6I...');

    // Update the price display based on selection
    function updatePrice() {
        const select = document.getElementById('size-select');
        const display = document.getElementById('display-amount');

        if (select.value === 'price_1TB1D3GRwb0pbw5MKe8KiTMr') {
            display.innerText = '$58.88';
        } else if (select.value !== "") {
            display.innerText = '$98.88';
        }
    }

    // Handle the Checkout button click
    document.getElementById('checkout-button').addEventListener('click', function() {
        const priceId = document.getElementById('size-select').value;
        const name = document.getElementById('cust-name').value;
        const bg = document.getElementById('cust-bg').value;
        const notes = document.getElementById('cust-notes').value;

        // Validation: Don't let them proceed without a name or size
        if (!priceId) { alert("Please select a size first."); return; }
        if (!name) { alert("Please enter your name."); return; }

        // Compile details for the success page
        const detailsString = `Name: ${name} | BG: ${bg} | Notes: ${notes}`;

        stripe.redirectToCheckout({
            lineItems: [{ price: priceId, quantity: 1 }],
            mode: 'payment',
            successUrl: 'https://metalmemory.net/success?details=' + encodeURIComponent(detailsString),
            cancelUrl: 'https://metalmemory.net/shop.html',
        }).then(function (result) {
            if (result.error) {
                alert(result.error.message);
            }
        });
    });
</script>

</body>
</html>
