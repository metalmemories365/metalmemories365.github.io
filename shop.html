<div class="metal-panel">
    <div class="panel-title">YOUR DELUXE PRINT DETAILS</div>

    <label for="size-select">Select Size</label>
    <select id="size-select" onchange="updatePrice()">
        <option value="" disabled selected>-- Select a Size --</option>
        <option value="https://buy.stripe.com/6oU4gzgJd0Gh7XG4wjEME01">8x12 Metal Print - $58.88</option>
        <option value="https://buy.stripe.com/8x2aEX50vex7a50gf1eME00">11x14 Metal Print - $98.88</option>
    </select>

    <label>Full Name</label>
    <input type="text" id="cust-name" placeholder="Name for the order">

    <label>Background Style #</label>
    <input type="text" id="cust-bg" placeholder="e.g., Background #4">

    <label>Any Specific Notes?</label>
    <textarea id="cust-notes" rows="3"></textarea>

    <div class="price-display">Total: <span id="display-amount">$0.00</span></div>

    <button class="buy-btn" onclick="goToCheckout()">COMPLETE PURCHASE</button>

    <p style="font-size: 0.8rem; text-align: center; margin-top: 10px;">
        * After payment, email photos to metalmemories365@gmail.com
    </p>
</div>

<script>
    // 1. Updates the dollar amount on the screen
    function updatePrice() {
        const select = document.getElementById('size-select');
        const display = document.getElementById('display-amount');

        if (select.value.includes("6oU4gzg")) { // 8x12 link
            display.innerText = '$58.88';
        } else if (select.value.includes("8x2aEX")) { // 11x14 link
            display.innerText = '$98.88';
        }
    }

    // 2. The "Forwarding" function
    function goToCheckout() {
        const stripeLink = document.getElementById('size-select').value;
        const name = document.getElementById('cust-name').value;

        if (!stripeLink) {
            alert("Please select a size first.");
            return;
        }
        if (!name) {
            alert("Please enter your name so I know whose order this is!");
            return;
        }

        // This opens your Stripe Payment Link in the same window
        window.location.href = stripeLink;
    }
</script>
