<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Prints | Metal Memories 365</title>
    <style>
        :root { --neon-blue: #00d2ff; --neon-purple: #9d50bb; --dark-gray: #1a1a1a; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Navigation Style matching your image */
        .nav-bar { background: var(--dark-gray); padding: 15px 0; border-bottom: 2px solid #333; font-family: sans-serif; font-size: 0.9rem; letter-spacing: 1px; }
        .nav-bar a { color: #fff; text-decoration: none; margin: 0 15px; text-transform: uppercase; transition: 0.3s; }
        .nav-bar a:hover { color: #ffcc00; }

        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        h1 { color: #ffcc00; text-transform: uppercase; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255,204,0,0.5); margin-bottom: 30px; }
        
        .catalog-img { 
            width: 100%; 
            border-radius: 10px; 
            border: 1px solid #444; 
            margin-bottom: 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
        }

        .btn-container { display: flex; gap: 25px; justify-content: center; flex-wrap: wrap; }
        
        /* Button Style matching the blue/purple buttons in your image */
        .size-btn { 
            padding: 25px; font-size: 1.3rem; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s;
            width: 320px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-8x12 { 
            background: linear-gradient(to bottom, #4a6a8a 0%, #2a3a4a 100%); 
            color: #fff; 
            box-shadow: 0 5px 15px rgba(0,210,255,0.3); 
        }
        
        .btn-11x14 { 
            background: linear-gradient(to bottom, #6a5a8a 0%, #3a2a4a 100%); 
            color: #fff; 
            box-shadow: 0 5px 15px rgba(157,80,187,0.3); 
        }

        .size-btn:hover { transform: translateY(-5px); filter: brightness(1.3); }
        .price { font-size: 2.2rem; color: #ffcc00; display: block; margin-top: 5px; }
        
        .footer-note { margin-top: 50px; font-family: sans-serif; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">Home</a> | 
        <a href="#">Templates</a> | 
        <a href="#">Galleries</a> | 
        <a href="#">About</a> | 
        <a href="#">Cart</a>
    </nav>

    <div class="container">
        <h1>Custom Sports Prints</h1>
        
        <img src="sportslanding.jpg" alt="Metal Memories Sports Catalog" class="catalog-img">
        
        <div class="btn-container">
            <a href="stripe8x12.html" class="size-btn btn-8x12">
                Order 8" x 12"
                <span class="price">$58.88</span>
            </a>

            <a href="stripe11x14.html" class="size-btn btn-11x14">
                Order 11" x 14"
                <span class="price">$98.88</span>
            </a>
        </div>
        
        <p class="footer-note">Upload your photos & order your custom metal print today!</p>
    </div>

</body>
</html>
