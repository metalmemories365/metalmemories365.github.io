<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Size | Metal Memories 365</title>
    <style>
        :root { --neon-blue: #00d2ff; --neon-purple: #9d50bb; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #ffcc00; text-transform: uppercase; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .catalog-img { width: 100%; border-radius: 15px; border: 3px solid #333; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .size-btn { 
            padding: 25px; font-size: 1.2rem; text-decoration: none; border-radius: 12px; font-weight: bold; transition: 0.3s;
            width: 300px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center;
        }
        .btn-8x12 { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-11x14 { background: var(--neon-purple); color: #fff; box-shadow: 0 0 20px var(--neon-purple); }
        .size-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .price { font-size: 2rem; display: block; margin-top: 5px; }
        .back-link { display: inline-block; margin-top: 50px; color: #666; text-decoration: none; font-family: Arial, sans-serif; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Choose Your Print Size</h1>
        <img src="html.sports.jpg" alt="Sports Catalog" class="catalog-img">
        
        <div class="btn-container">
            <a href="order8x12.html" class="size-btn btn-8x12">
                Order 8" x 12"
                <span class="price">$58.88</span>
            </a>
            <a href="order11x14.html" class="size-btn btn-11x14">
                Order 11" x 14"
                <span class="price">$98.88</span>
            </a>
        </div>
        <a href="index.html" class="back-link">← Return to Gallery</a>
    </div>
</body>
</html>
        <br><br>
        <a href="index.html" style="color: #666; text-decoration: none;">← Back to Home</a>
    </div>
</body>
</html>
