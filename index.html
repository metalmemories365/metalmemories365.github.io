<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Memories 365 | Huntington Beach</title>
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --neon-purple: #9d50bb; 
            --neon-pink: #f06292; 
            --neon-orange: #ff9800; 
        }
        
        body { 
            margin: 0; font-family: 'Arial Black', sans-serif; 
            background: #000; color: #fff; text-align: center; 
        }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        header { padding: 40px 0; }
        h1 { font-size: 3rem; color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); margin: 0; }

        /* Section Layout */
        .section-box {
            display: block;
            margin-bottom: 40px;
            text-decoration: none;
            transition: transform 0.3s ease, filter 0.3s ease;
            position: relative;
        }

        .section-box:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .section-img {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        /* Border Glows */
        .glow-blue { border: 4px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); }
        .glow-purple { border: 4px solid var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple); }
        .glow-pink { border: 4px solid var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); }
        .glow-orange { border: 4px solid var(--neon-orange); box-shadow: 0 0 25px var(--neon-orange); }

        footer { 
            padding: 60px 20px; color: #555; border-top: 1px solid #222; 
            font-size: 0.9rem; margin-top: 50px; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>METAL MEMORIES 365</h1>
        <p style="color: #888;">Custom Sublimation Prints & Memorials</p>
    </header>

    <a href="shop.html" class="section-box">
        <img src="SPORTS.JPG" alt="Custom Sports Metal" class="section-img glow-blue">
    </a>

    <a href="#" class="section-box">
        <img src="MEMORIES.JPG" alt="Holidays & Family" class="section-img glow-purple">
    </a>

    <a href="#" class="section-box">
        <img src="WINDSPINNER.JPG" alt="Memorial Spinners" class="section-img glow-pink">
    </a>

    <a href="#" class="section-box">
        <img src="rightwing.jpg" alt="Political Art" class="section-img glow-orange">
    </a>

</div>

<footer>
    <p>Located in Huntington Beach, CA</p>
    <p>Contact: metalmemories365@gmail.com</p>
    <p>&copy; 2026 Metal Memories. All Rights Reserved.</p>
</footer>

</body>
</html>
