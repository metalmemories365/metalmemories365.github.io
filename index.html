<!DOCTYPE html>

        .glow-blue { border: 3px solid #00d2ff; box-shadow: 0 0 20px #00d2ff; }

        .glow-orange { border: 3px solid #ff9800; box-shadow: 0 0 20px #ff9800; }

        /* Footer Info */
        footer {

            color: #888; 
            font-size: 0.8rem; 
            border-top: 1px solid #222;
