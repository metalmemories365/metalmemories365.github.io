<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Memories 365</title>
    <style>
        /* Base Page Styles */
        body {
            margin: 0;
            background: #000;
            font-family: 'Impact', sans-serif;
            color: #fff;
            text-align: center;
            overflow-x: hidden;
        }

        .hero-container {
            max-width: 1000px;
            margin: 10px auto;
            padding: 15px;
        }

        /* The Hero Image */
        .hero-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.25);
            display: block;
        }

        /* Pulsing Enter Button */
        .enter-btn {
            display: inline-block;
            margin-top: 30px;
            background: #ffcc00;
            color: #000;
            padding: 18px 50px;
            font-size: 1.8rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse-glow 2s infinite;
        }

        /* Interaction Effects */
        .enter-btn:hover {
            background: #fff;
            transform: scale(1.05);
            animation: none;
        }

        /* The "Lightning" Pulse Animation */
        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 204, 0, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 204, 0, 0);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .enter-btn {
                font-size: 1.4rem;
                padding: 15px 30px;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <img src="image-for-landing.jpg" alt="Metal Memories Deluxe Collector's Edition" class="hero-img">

        <br>

        <a href="shop.html" class="enter-btn">ENTER SHOP & CUSTOMIZE</a>
    </div>

</body>
</html>
