<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Memories 365</title>
    <style>
        body {
            margin: 0; padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111; color: #fff; text-align: center;
        }
        h1 { color: #ffcc00; font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }

        .product-card {
            background: #222; border: 1px solid #444; border-radius: 12px;
            padding: 20px; margin: 20px auto; max-width: 400px;
        }
        button {
            background: #ffcc00; color: #111; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-weight: bold;
            border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

    <h1>Metal Memories 365</h1>
    <p>Premium Sublimation Metal Prints</p>

    <div class="product-card">
        <h2>8x12 Metal Print</h2>
        <p>Price: $54.88</p>
        <button id="buy8x12">Purchase 8x12</button>
    </div>

    <div class="product-card">
        <h2>11x14 Metal Print</h2>
        <p>Price: $88.00</p>
        <button id="buy11x14">Purchase 11x14</button>
    </div>
<script>
    const stripe = Stripe('pk_live_51TAyheGRwb0pbw5MnKWqys0u8Uxmve11CJjazlbGsGON1v5NXLc7jcXsLZKcXg4rhCM1AHxgRiWotsD');

    // 8x12 Logic
    document.getElementById('buy8x12').addEventListener('click', () => {
        stripe.redirectToCheckout({
            lineItems: [{ price: 'price_1TB1D3GRwb0pbw5MKe8KiTMr', quantity: 1 }],
            mode: 'payment',
            automaticTax: { enabled: true },
            shippingAddressCollection: { allowedCountries: ['US'] },
            successUrl: 'https://metalmemory.net/success',
            cancelUrl: 'https://metalmemory.net/cancel',
        });
    });

    // 11x14 Logic
    document.getElementById('buy11x14').addEventListener('click', () => {
        stripe.redirectToCheckout({
            lineItems: [{ price: 'price_1TB1EYGRwb0pbw5MMX4nst6k', quantity: 1 }],
            mode: 'payment',
            automaticTax: { enabled: true },
            shippingAddressCollection: { allowedCountries: ['US'] },
            successUrl: 'https://metalmemory.net/success',
            cancelUrl: 'https://metalmemory.net/cancel',
        });
    });
</script>
